name: Deploy Build a Brain to GitHub Pages

# Build the webapp and publish it to GitHub Pages on every push to main.
# The site is host-agnostic (relative base "./" + hash router), so it works
# unchanged at https://<user>.github.io/Build-a-Brain/.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# Permissions the deploy job needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      # NOTE on npm ci vs npm install (re: supply-chain review):
      # Vite 8 / rolldown pulls platform-specific optional NATIVE bindings whose
      # deeply-nested wasm-runtime deps (@emnapi/core, @emnapi/runtime, …) resolve to
      # DIFFERENT versions on Linux than the committed lockfile (authored on Windows)
      # can express — so `npm ci` (lockfile-strict) is genuinely not viable here, the
      # unavoidable-platform-deps exception. We keep the committed package-lock.json as
      # the version anchor for everything deterministic, and run a dedicated audit step
      # (the sanctioned alternative to suppressing audit on the install itself).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # auto-enable Pages if it isn't on yet

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
