name: Deploy Build a Brain to GitHub Pages

# Build the webapp and publish it to GitHub Pages on every push to main.
# The site is host-agnostic (relative base "./" + hash router), so it works
# unchanged at https://<user>.github.io/Build-a-Brain/.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# Permissions the deploy job needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the Node/npm that generated package-lock.json (Node 24 → npm 11).
          # A mismatched npm major (runner's npm 10 vs lock's npm 11) is what made
          # `npm ci` reject the lockfile, not a genuinely missing/invalid lock.
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        # Lockfile-strict, reproducible install. `npm ci` does not run audit, so
        # there is no audit suppression here; optional platform deps are included
        # by default. Security audit runs as a separate, non-blocking step below.
        run: npm ci

      - name: Security audit (non-blocking)
        run: npm audit --audit-level=high || true

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # auto-enable Pages if it isn't on yet

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
